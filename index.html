<!DOCTYPE html>
<html>
<head>
    <title>2D Game</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 200, y: 400, width: 50, height: 50, speed: 7 };
let block = { x: 100, y: 0, width: 30, height: 30, speed: 4 };
let score = 0;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    block.y += block.speed;

    if (
        block.x < player.x + player.width &&
        block.x + block.width > player.x &&
        block.y < player.y + player.height &&
        block.y + block.height > player.y
    ) {
        score++;
        block.y = 0;
        block.x = Math.random() * canvas.width;
    }

    if (block.y > canvas.height) {
        block.y = 0;
        block.x = Math.random() * canvas.width;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = "red";
    ctx.fillRect(block.x, block.y, block.width, block.height);

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 20, 20);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
